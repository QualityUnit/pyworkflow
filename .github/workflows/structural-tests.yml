name: Structural Tests

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  structural-tests:
    name: Architectural Boundary Validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate architectural boundaries
        run: bash scripts/structural-tests.sh

      - name: Verify core/ dependency isolation
        run: |
          echo "Checking that core/ does not import from engine/ or celery/..."
          if grep -rn \
               -e "from pyworkflow\.engine" \
               -e "from pyworkflow\.celery" \
               -e "import pyworkflow\.engine" \
               -e "import pyworkflow\.celery" \
               pyworkflow/core/ 2>/dev/null; then
            echo "::error::core/ must not import from engine/ or celery/"
            exit 1
          fi
          echo "✔ core/ is isolated from engine/ and celery/"

      - name: Verify engine/ does not import from celery/
        run: |
          echo "Checking that engine/ does not import from celery/..."
          if grep -rn \
               -e "from pyworkflow\.celery" \
               -e "import pyworkflow\.celery" \
               pyworkflow/engine/ 2>/dev/null; then
            echo "::error::engine/ must not import from celery/"
            exit 1
          fi
          echo "✔ engine/ does not import from celery/"

      - name: Verify storage/ has no upward dependencies
        run: |
          echo "Checking that storage/ has no imports from other pyworkflow modules..."
          if grep -rn \
               -e "from pyworkflow\.core" \
               -e "from pyworkflow\.engine" \
               -e "from pyworkflow\.celery" \
               -e "from pyworkflow\.primitives" \
               -e "from pyworkflow\.context" \
               -e "import pyworkflow\.core" \
               -e "import pyworkflow\.engine" \
               -e "import pyworkflow\.celery" \
               -e "import pyworkflow\.primitives" \
               -e "import pyworkflow\.context" \
               pyworkflow/storage/ 2>/dev/null; then
            echo "::error::storage/ must not import from other pyworkflow modules"
            exit 1
          fi
          echo "✔ storage/ has no upward dependencies"
