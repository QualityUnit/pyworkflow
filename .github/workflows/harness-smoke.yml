name: Harness Smoke Tests

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  harness-smoke:
    name: Harness Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate harness.config.json schema
        run: |
          python3 -c "
          import json, sys
          with open('harness.config.json') as f:
              config = json.load(f)

          required = ['version', 'riskTiers', 'commands', 'shaDiscipline', 'architecturalBoundaries']
          missing = [k for k in required if k not in config]
          if missing:
              print('Missing required keys:', ', '.join(missing)); sys.exit(1)

          for tier in ['tier1', 'tier2', 'tier3']:
              if tier not in config['riskTiers']:
                  print('Missing risk tier:', tier); sys.exit(1)
              t = config['riskTiers'][tier]
              if not isinstance(t.get('patterns'), list):
                  print(tier, 'missing patterns array'); sys.exit(1)
              if not isinstance(t.get('requiredChecks'), list):
                  print(tier, 'missing requiredChecks array'); sys.exit(1)

          if not isinstance(config.get('shaDiscipline', {}).get('enforceExactSha'), bool):
              print('shaDiscipline.enforceExactSha must be boolean'); sys.exit(1)

          modules = list(config.get('architecturalBoundaries', {}).keys())
          if not modules:
              print('architecturalBoundaries must define at least one module'); sys.exit(1)

          print(f'✔ harness.config.json schema valid ({len(modules)} modules, 3 tiers)')
          "

      - name: Validate harness commands exist
        run: |
          python3 -c "
          import json, sys
          with open('harness.config.json') as f:
              config = json.load(f)
          with open('pyproject.toml') as f:
              pyproject_text = f.read()
          cmds = config.get('commands', {})
          for key, cmd in cmds.items():
              bin_name = cmd.split()[0]
              found = bin_name in pyproject_text
              marker = '✔' if found else '⚠'
              status = '(found in pyproject.toml)' if found else '(not in pyproject.toml — verify it is a dev dep)'
              print(marker, f'{key}: {cmd}', status)
          "

      - name: Check CLAUDE.md
        run: |
          if [[ ! -s CLAUDE.md ]]; then
            echo "::error::CLAUDE.md is missing or empty"
            exit 1
          fi
          echo "✔ CLAUDE.md present ($(wc -l < CLAUDE.md) lines)"

      - name: Check critical project files
        run: |
          files=(
            pyproject.toml
            poetry.lock
            harness.config.json
            pyworkflow/__init__.py
            pyworkflow/engine/executor.py
            pyworkflow/engine/replay.py
            pyworkflow/celery/tasks.py
            pyworkflow/storage/base.py
          )
          missing=0
          for f in "${files[@]}"; do
            if [[ ! -f "$f" ]]; then
              echo "::error::Missing: $f"
              ((missing++))
            fi
          done
          if (( missing > 0 )); then exit 1; fi
          echo "✔ All ${#files[@]} critical files present"

      - name: Check CI workflow files
        run: |
          workflows=(
            .github/workflows/ci.yml
            .github/workflows/structural-tests.yml
            .github/workflows/harness-smoke.yml
          )
          missing=0
          for f in "${workflows[@]}"; do
            if [[ ! -f "$f" ]]; then
              echo "::error::Missing workflow: $f"
              ((missing++))
            fi
          done
          if (( missing > 0 )); then exit 1; fi
          echo "✔ All ${#workflows[@]} workflow files present"

      - name: Check PR template
        run: |
          if [[ -f .github/PULL_REQUEST_TEMPLATE.md ]]; then
            echo "✔ PR template: .github/PULL_REQUEST_TEMPLATE.md"
          elif [[ -f templates/pr-template.md ]]; then
            echo "✔ PR template: templates/pr-template.md"
          else
            echo "::warning::No PR template found — consider adding .github/PULL_REQUEST_TEMPLATE.md"
          fi

      - name: Check risk-policy-gate script
        run: |
          if [[ ! -f scripts/risk-policy-gate.sh ]]; then
            echo "::error::scripts/risk-policy-gate.sh not found"
            exit 1
          fi
          echo "✔ Risk policy gate script present"

      - name: Check structural-tests script
        run: |
          if [[ ! -f scripts/structural-tests.sh ]]; then
            echo "::error::scripts/structural-tests.sh not found"
            exit 1
          fi
          echo "✔ Structural tests script present"
